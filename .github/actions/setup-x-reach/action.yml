name: Setup X Reach
description: Install the Twitter-only X Reach CLI from this repository without copying files into the caller project.

inputs:
  install-twitter-cli:
    description: Install twitter-cli for Twitter/X collection.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Install uv
      shell: bash
      run: |
        set -euo pipefail
        python -m pip install --upgrade uv

    - name: Add user script directory to PATH
      shell: bash
      run: |
        set -euo pipefail
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - name: Install X Reach
      shell: bash
      run: |
        set -euo pipefail
        repo_root="$(cd "$GITHUB_ACTION_PATH/../../.." && pwd)"
        uv tool install --force "$repo_root"
        x-reach version

    - name: Install optional backend tools
      shell: bash
      run: |
        set -euo pipefail
        if [ "${{ inputs.install-twitter-cli }}" = "true" ]; then
          uv tool install --force twitter-cli
        fi

