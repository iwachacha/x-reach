name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "windows-latest"]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          pip install -c constraints.txt -e ".[dev]"

      - name: Run ruff
        run: |
          ruff check .

      - name: Run CLI mypy gate
        run: |
          mypy --follow-imports skip x_reach/cli agent_reach/cli.py

      - name: Run CLI contract tests
        run: |
          pytest tests/test_cli_contracts.py tests/test_agent_reach_compat.py -q

      - name: Run tests
        run: |
          pytest -q
