name: Agent Reach Smoke

"on":
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Agent Reach
        uses: ./.github/actions/setup-agent-reach
        with:
          install-twitter-cli: "true"

      - name: Run smoke collection
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .agent-reach
          agent-reach channels --json > .agent-reach/channels.json
          agent-reach doctor --json > .agent-reach/doctor.json
          agent-reach collect --json --save .agent-reach/evidence.jsonl --run-id smoke-twitter --intent smoke --query-id twitter-openai --source-role social_search --channel twitter --operation search --input "OpenAI" --limit 1 > .agent-reach/twitter.json || true
          agent-reach ledger summarize --input .agent-reach/evidence.jsonl --json > .agent-reach/summary.json
          agent-reach plan candidates --input .agent-reach/evidence.jsonl --by normalized_url --limit 10 --json > .agent-reach/candidates.json

      - name: Upload raw smoke artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agent-reach-smoke
          path: |
            .agent-reach/channels.json
            .agent-reach/doctor.json
            .agent-reach/evidence.jsonl
            .agent-reach/summary.json
            .agent-reach/twitter.json
            .agent-reach/candidates.json
