interface:
  display_name: "X Reach"
  short_description: "Explicit-opt-in Twitter/X collection and diagnostics"
  default_prompt: "When the user explicitly asks for X Reach, use it to discover the live Twitter/X channel contract, inspect caller-defined readiness requirements, check probe attention, validate evidence ledgers, and run thin read-only collection over `twitter` when configured. Always refer to channels by their stable names from `x-reach channels --json`. X Reach does not choose scope; the calling workflow chooses time windows, scale, topic assumptions, final selection, synthesis, and posting for the task. Keep lightweight asks on collect by default, prefer `collect --spec` for broad resumable mission runs, use explicit pacing such as `--query-delay 1 --throttle-cooldown 30` when concurrent broad collection is requested, treat batch and scout as explicit opt-in helpers, and keep final interpretation, scheduling, media analysis, and publishing outside X Reach. Collection-only or raw-evidence handoff is a valid endpoint, so do not synthesize unless the user asked for it. For large JSON handoffs, prefer `--raw-mode none|minimal` plus `--item-text-mode snippet|none`; keep full item text for shortlisted deep reads."

